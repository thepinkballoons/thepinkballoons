<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>The Pink Balloons</title>

<style>
body{
margin:0;
font-family:Arial;
background:#fdeff4;
}

header{
text-align:center;
padding:20px;
font-size:32px;
font-weight:bold;
color:#ff4da6;
}

.category-bar{
display:flex;
justify-content:center;
flex-wrap:wrap;
gap:10px;
padding:10px;
}

.category-bar button{
padding:10px 18px;
border-radius:25px;
border:2px solid hotpink;
background:white;
cursor:pointer;
font-weight:bold;
}

.category-bar button:hover{
background:hotpink;
color:white;
}

.gallery{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;
padding:20px;
}

.card{
background:white;
border-radius:15px;
box-shadow:0 5px 15px rgba(0,0,0,0.1);
padding:15px;
text-align:center;
}

.card img{
width:100%;
height:250px;
object-fit:cover;
border-radius:12px;
}

.bookBtn{
background:#28a745;
border:none;
padding:10px 18px;
color:white;
border-radius:8px;
cursor:pointer;
margin-top:10px;
}

.oldPrice{
text-decoration:line-through;
color:gray;
margin-right:8px;
}

.offerTag{
background:red;
color:white;
padding:3px 8px;
border-radius:6px;
font-size:12px;
margin-left:5px;
}
</style>
</head>

<body>

<header>The Pink Balloons 🎈</header>

<div class="category-bar">
<button onclick="showCategory('Kids')">Kids Theme</button>
<button onclick="showCategory('Car')">Car Dickey</button>
<button onclick="showCategory('Classic')">Classic Decoration</button>
<button onclick="showCategory('Ring')">Ring Decoration</button>
<button onclick="showCategory('Premium')">Premium Decoration</button>
<button onclick="showCategory('All')">Show All</button>
</div>

<div class="gallery" id="gallery"></div>

<script>

const data=[

{category:"Kids",name:"Hello Kitty",price:"₹2349",image:"1.jpeg"},
{category:"Car",name:"Car Dickey Birthday Decoration",price:"₹2349",image:"2.jpeg"},
{category:"Classic",name:"Classic White & Gold",price:"₹2349",image:"3.jpeg"},
{category:"Kids",name:"Flamingo Theme",price:"₹2349",image:"4.jpeg"},
{category:"Classic",name:"Black & Gold",price:"₹2349",image:"5.jpg"},
{category:"Ring",name:"Round Balloon Birthday",price:"₹2349",image:"6.jpg"},
{category:"Premium",name:"Chrome Birthday",price:"₹2449",oldPrice:"₹2999",image:"7.jpg",offer:"20% OFF"},
{category:"Kids",name:"1st Birthday Package",price:"₹2349",image:"8.jpg"},

{category:"Premium",name:"Royal Green & Gold",price:"₹2349",image:"21.png"},
{category:"Kids",name:"Princess Pink Theme",price:"₹2349",image:"22.png"},
{category:"Premium",name:"Black & Gold Luxury",price:"₹2449",oldPrice:"₹2999",image:"23.png",offer:"18% OFF"},
{category:"Kids",name:"Divine Krishna Theme",price:"₹1949",image:"24.png"},

];

const gallery=document.getElementById("gallery");

function display(items){

gallery.innerHTML="";

items.forEach(item=>{

gallery.innerHTML+=`

<div class="card">

<img src="images/${item.image}">

<h3>${item.name}</h3>

<p>
${item.oldPrice?`<span class="oldPrice">${item.oldPrice}</span>`:""}
<b>${item.price}</b>
${item.offer?`<span class="offerTag">${item.offer}</span>`:""}
</p>

<a href="https://wa.me/918755326881" target="_blank">
<button class="bookBtn">Book Now</button>
</a>

</div>

`;

});

}

function showCategory(cat){

if(cat=="All"){
return display(data);
}

const filtered=data.filter(item=>item.category===cat);

display(filtered);

}

// default load

display(data);

</script>

</body>
</html>
