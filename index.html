<!DOCTYPE html>
<html>
<head>
<title>The Pink Balloons</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
margin:0;
font-family:Arial;
background:#ffe6f0;
}

header{
background:#ff4da6;
color:white;
padding:20px;
text-align:center;
font-size:28px;
}

.buttons{
text-align:center;
padding:15px;
}

.buttons button{
padding:10px 15px;
margin:5px;
border-radius:20px;
border:none;
background:#ff4da6;
color:white;
cursor:pointer;
}

.gallery{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:15px;
padding:20px;
}

.card{
background:white;
padding:10px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.2);
}

.card img{
width:100%;
border-radius:10px;
}

.book{
background:green;
color:white;
padding:8px;
border:none;
border-radius:5px;
margin-top:5px;
cursor:pointer;
}

</style>

</head>

<body>

<header>
🎈 The Pink Balloons
</header>

<div class="buttons">
<button onclick="show('all')">All</button>
<button onclick="show('kids')">Kids</button>
<button onclick="show('car')">Car</button>
<button onclick="show('premium')">Premium</button>
</div>

<div class="gallery" id="gallery"></div>

<script>

const data=[

{cat:'kids',name:'Hello Kitty',price:'₹2349',img:'1.jpeg'},
{cat:'car',name:'Car Dickey',price:'₹2349',img:'2.jpeg'},
{cat:'kids',name:'White Gold',price:'₹2349',img:'3.jpeg'},
{cat:'premium',name:'Flamingo',price:'₹2349',img:'4.jpeg'},

{cat:'premium',name:'Green Gold',price:'₹2349',img:'5.jpg'},
{cat:'kids',name:'Princess',price:'₹2349',img:'6.jpg'},
{cat:'premium',name:'Black Gold',price:'₹2449',img:'7.jpg'},
{cat:'kids',name:'Birthday Package',price:'₹2349',img:'8.jpg'},

{cat:'premium',name:'Decoration',price:'₹2349',img:'21.png'},
{cat:'premium',name:'Decoration',price:'₹2349',img:'22.png'},
{cat:'premium',name:'Decoration',price:'₹2349',img:'23.png'},
{cat:'premium',name:'Decoration',price:'₹2349',img:'24.png'},
{cat:'premium',name:'Decoration',price:'₹2349',img:'25.png'},
{cat:'premium',name:'Decoration',price:'₹2349',img:'26.png'},
{cat:'premium',name:'Decoration',price:'₹2349',img:'27.png'},
{cat:'premium',name:'Decoration',price:'₹2349',img:'28.png'},
{cat:'premium',name:'Decoration',price:'₹2349',img:'29.png'},
{cat:'premium',name:'Decoration',price:'₹2349',img:'30.png'}

];

function show(category){

let gallery=document.getElementById("gallery");

gallery.innerHTML="";

data
.filter(item => category==='all' || item.cat===category)
.forEach(item => {

gallery.innerHTML+=`

<div class="card">

<img src="${item.img}">

<h3>${item.name}</h3>

<p>${item.price}</p>

<a href="https://wa.me/918755326881">

<button class="book">Book Now</button>

</a>

</div>

`;

});

}

show('all');

</script>

</body>
</html>
