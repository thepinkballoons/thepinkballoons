});

}



function loadGallery(categoryIndex){

gallery.innerHTML="";

galleryData[categoryIndex].items.forEach(item=>{

gallery.innerHTML+=`

<div class="card">

<img src="images/${item.image}">

<h3>${item.name}</h3>

<p>${item.price}</p>

<a href="https://wa.me/918755326881">

<button class="bookBtn">

Book Now

</button>

</a>

</div>

`;

});

}
